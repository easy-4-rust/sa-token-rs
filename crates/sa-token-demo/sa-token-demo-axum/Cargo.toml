[package]
name = "sa-token-demo-axum"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Axum demo for sa-token-rs (maps Java sa-token-demo-springboot)"
publish = false

[[bin]]
name = "sa-token-demo-axum"
path = "src/main.rs"

[dependencies]
sa-token.workspace = true
sa-token-web-axum.workspace = true
sa-token-dao-memory.workspace = true
sa-token-context-mock.workspace = true
axum = { workspace = true, features = ["macros"] }
tokio.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
tower-http = { workspace = true, features = ["set-header"] }
http.workspace = true

[lints]
workspace = true
