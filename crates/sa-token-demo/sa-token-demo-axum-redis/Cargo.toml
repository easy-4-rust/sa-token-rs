version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Axum Redis demo (maps Java sa-token-demo-springboot-redis)"
publish = false

[[bin]]
name = "sa-token-demo-axum-redis"
path = "src/main.rs"

[dependencies]
sa-token = { workspace = true, features = ["redis"] }
