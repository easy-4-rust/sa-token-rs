[package]
name = "sa-token-demo-tera"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Axum + Tera demo (maps Java sa-token-demo-freemarker → sa-token-demo-tera; FreeMarker→Tera, Spring Boot→axum)"
publish = false

[[bin]]
name = "sa-token-demo-tera"
path = "src/main.rs"

[dependencies]
sa-token.workspace = true
sa-token-web-axum.workspace = true
sa-token-dao-memory.workspace = true
sa-token-context-mock.workspace = true
sa-token-tera.workspace = true
axum = { workspace = true, features = ["macros"] }
tokio.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
tera.workspace = true
tower-http = { workspace = true, features = ["set-header"] }
http.workspace = true

[lints]
workspace = true
