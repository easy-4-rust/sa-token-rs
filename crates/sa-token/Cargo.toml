[package]
name = "sa-token"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Sa-Token-Rs: 轻量级权限认证框架"

[features]
default = []
redis = ["dep:sa-token-dao-redis"]
actix-web = ["dep:sa-token-web-actix"]
salvo = ["dep:sa-token-web-salvo"]
apikey = ["dep:sa-token-apikey"]
serializer-features = ["dep:sa-token-serializer-features"]
jwt = ["dep:sa-token-jwt"]
temp-jwt = ["dep:sa-token-temp-jwt"]
