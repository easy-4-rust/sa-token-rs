[dependencies]
sa-token-core.workspace = true
sa-token-derive.workspace = true
sa-token-context-mock.workspace = true
sa-token-dao-memory.workspace = true
sa-token-dao-redis = { workspace = true, optional = true }
sa-token-web-actix = { workspace = true, optional = true }
sa-token-web-salvo = { workspace = true, optional = true }
sa-token-apikey = { workspace = true, optional = true }
sa-token-serializer-features = { workspace = true, optional = true }
sa-token-jwt = { workspace = true, optional = true }
sa-token-temp-jwt = { workspace = true, optional = true }
sa-token-quick-login = { workspace = true, optional = true }
sa-token-sign = { workspace = true, optional = true }

[lints]
workspace = true
